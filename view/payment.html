{{ block "payment-success" . }}
<html>
    {{ template "head" . }}
    <title>Payment Success</title>
    <body hx-ext="response-targets" class="flex flex-col items-center">
        <div class="wrapper mt-[4rem] w-[70%]">
            <div class="flex flex-col items-center rounded-sm gap-2 border border-green-600
            bg-green-300 py-5 px-3 text-green-800 capitalize font-bold shadow-sm">
                <i class="fa-solid fa-check text-[1.5rem]"></i>
                <span class="text-[1.5rem]">pembayaran berhasil</span>
                <span class="text-[.9rem]">terimakasih telah berkuliner di Website Kami</span>
                <a href="/home" class="underline text-[.9rem]">Back to homepage</a>
            </div>
        </div>
    </body>
</html>
{{ end }}

{{ block "payment-failed" . }}
<html>
    {{ template "head" . }}
    <title>Payment Failed</title>
    <body hx-ext="response-targets" class="flex flex-col items-center">
        <div class="wrapper mt-[4rem] w-[70%]">
            <div class="flex flex-col items-center rounded-sm gap-2 border border-red-600
            bg-red-300 py-5 px-3 text-red-800 capitalize font-bold shadow-sm">
                <i class="fa-solid fa-triangle-exclamation text-[1.5rem]"></i>
                <span class="text-[1.5rem]">pembayaran gagal</span>
                <a href="/home" class="underline text-[.9rem]">Back to homepage</a>
            </div>
        </div>
    </body>
</html>
{{ end }}
