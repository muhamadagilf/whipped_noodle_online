services:
  redis:
    image: redis:7-alpine
    container_name: SEBLAK99_RDB
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  app:
    build: .
    container_name: SEBLAK99_APP
    ports:
      - "8000:8000"
    env_file:
      - .env 
    volumes:
      - ./data/sqlite:/app/data
    depends_on:
      - redis